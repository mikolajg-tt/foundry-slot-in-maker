<div class="session-form-content">
    <div class="form-group" style="margin: 10px 0;">
        <label for="systemSelect">Game System</label>
    </div>
    <div class="form-group" style="margin: 10px 0;">
        <select id="systemSelect" name="gameSystem" required style="width: 100%;">
            <option value="" disabled selected>Select a game system</option>
            <option value="Dungeons & Dragons">Dungeons & Dragons</option>
            <option value="Pathfinder">Pathfinder</option>
        </select>
    </div>

    <div class="form-group" style="margin: 10px 0;">
        <label for="moduleText">Slot-in Text</label>
    </div>
    <div class="form-group" style="margin: 10px 0;">
        <textarea id="moduleText" name="moduleText" placeholder="Enter text here" rows="10" required style="width: 100%; box-sizing: border-box;"></textarea>
    </div>

    <div class="form-group" style="margin: 10px 0;">
        <label for="slotinFolder">Slot-in Folder</label>
    </div>
    <div class="form-group" style="margin: 10px 0; display: flex; align-items: center; gap: 6px;">
        <input type='text' id="slotinFolder" name="path" value="{{path}}" style="flex: 1;" />
        <button type="button" class="file-picker" data-action="browseFolder" title="Browse Files" tabindex="-1">
            <i class="fas fa-file-import fa-fw"></i>
        </button>
    </div>

    <div class="form-group" style="margin: 10px 0;">
        <button type="submit" style="width: 100%; padding: 10px 28px; font-size: 1.1em;">Submit</button>
    </div>
</div>
